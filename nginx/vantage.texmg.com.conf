# /etc/nginx/sites-available/vantage.texmg.com
# Symlink: ln -s /etc/nginx/sites-available/vantage.texmg.com.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name vantage.texmg.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vantage.texmg.com;

    ssl_certificate     /etc/letsencrypt/live/vantage.texmg.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vantage.texmg.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Increase body size for PDF uploads / report generation
    client_max_body_size 20M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }
}
